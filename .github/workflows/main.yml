      - name: Locate Source Path
        run: |
          go mod init openlist-core
          go mod edit -replace github.com/Xhofe/alist=github.com/OpenListTeam/OpenList@v1.0.6
          go mod tidy
          echo "--- 正在扫描项目真实路径 ---"
          # 使用 find 命令列出所有包含 alistlib 或 main 的目录
          find . -maxdepth 4 -name "*.go" | grep -E "alistlib|main"
