name: Build OpenList Core

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.22

      - name: Compile OpenList to AAR
        run: |
          # 1. 初始化 Go 模块
          go mod init openlist-core
          # 2. 下载 OpenList 核心库
          go get github.com/OpenListTeam/OpenList
          # 3. 安装 gomobile 工具
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          # 4. 编译成 Android 库 (AAR)
          # 注意：这里会把 OpenList 的核心函数转换成 Java 可调用的接口
          gomobile bind -target=android github.com/OpenListTeam/OpenList/...

      - name: Upload Core Library
        uses: actions/upload-artifact@v4
        with:
          name: OpenList-AAR
          path: |
            *.aar
            *.jar
